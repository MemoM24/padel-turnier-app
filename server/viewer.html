<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDL1 – Turnier Live-Ansicht</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
    }
    .header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header img { height: 36px; }
    .header-text h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .header-text p { font-size: 12px; color: #888; margin-top: 2px; }
    .badge {
      margin-left: auto;
      background: #1a9e6f;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge.done { background: #555; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; }
    .meta-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .meta-row:last-child { margin-bottom: 0; }
    .meta-label { font-size: 12px; color: #666; }
    .meta-value { font-size: 13px; font-weight: 600; color: #ccc; }
    .tabs {
      display: flex;
      background: #1a1a1a;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 16px;
      gap: 4px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: transparent;
    }
    .tab.active { background: #1a9e6f; color: #fff; }
    /* ── Standings ── */
    .standings-table { width: 100%; border-collapse: collapse; }
    .standings-table th {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 6px 8px;
      text-align: right;
    }
    .standings-table th:first-child { text-align: left; }
    .standings-table td {
      padding: 10px 8px;
      font-size: 14px;
      border-top: 1px solid #1e1e1e;
      text-align: right;
    }
    .standings-table td:first-child { text-align: left; }
    .rank-cell { display: flex; align-items: center; gap: 8px; }
    .rank-num { font-size: 13px; color: #555; width: 18px; }
    .medal { font-size: 16px; }
    .player-name { font-size: 14px; font-weight: 600; color: #f0f0f0; }
    .pts-cell { font-weight: 700; color: #1a9e6f; font-size: 15px; }
    /* ── Rounds ── */
    .round-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 12px;
      scrollbar-width: none;
    }
    .round-tabs::-webkit-scrollbar { display: none; }
    .round-btn {
      flex-shrink: 0;
      min-width: 44px;
      padding: 8px 14px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      color: #888;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .round-btn.active { background: #1a3a2a; border-color: #1a9e6f; color: #1a9e6f; }
    .match-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .match-card.done { border-color: #1a9e6f; background: #0d2b1f; }
    .match-court {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .team-names {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: #ddd;
      line-height: 1.5;
    }
    .team-names.right { text-align: right; }
    .score-box {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .score-num {
      background: #2a2a2a;
      border-radius: 8px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }
    .score-num.winner { background: #1a3a2a; color: #4ade80; }
    .score-divider { color: #444; font-size: 14px; font-weight: 600; }
    .bye-section { margin-top: 16px; }
    .bye-label { font-size: 12px; color: #555; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .bye-players { display: flex; flex-wrap: wrap; gap: 6px; }
    .bye-chip {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: #888;
    }
    .loading { text-align: center; padding: 60px 20px; color: #555; font-size: 16px; }
    .error { text-align: center; padding: 60px 20px; color: #ef4444; font-size: 15px; }
    .refresh-btn {
      display: block;
      margin: 16px auto 0;
      background: #1a9e6f;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .readonly-banner {
      background: #1e3a5f;
      border: 1px solid #2563eb44;
      border-radius: 10px;
      padding: 10px 14px;
      text-align: center;
      font-size: 12px;
      color: #93c5fd;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">⏳ Turnierdaten werden geladen…</div>
  </div>

  <script>
    const tournamentId = new URLSearchParams(location.search).get('id');
    const apiBase = location.origin.replace(/^(https?:\/\/)8081-/, '$13000-');
    let tournament = null;
    let activeTab = 'standings'; // 'standings' | 'rounds'
    let activeRound = 0;

    async function fetchTournament() {
      if (!tournamentId) {
        document.getElementById('app').innerHTML = '<div class="error">Keine Turnier-ID angegeben.</div>';
        return;
      }
      try {
        const res = await fetch(`${apiBase}/api/trpc/tournament.get?input=${encodeURIComponent(JSON.stringify({ json: { id: tournamentId } }))}`);
        const json = await res.json();
        tournament = json?.result?.data?.json;
        if (!tournament) {
          document.getElementById('app').innerHTML = '<div class="error">Turnier nicht gefunden.<br><small style="color:#666">ID: ' + tournamentId + '</small></div>';
          return;
        }
        activeRound = (tournament.currentRound || 1) - 1;
        render();
      } catch (e) {
        document.getElementById('app').innerHTML = '<div class="error">Fehler beim Laden der Daten.<br><button class="refresh-btn" onclick="fetchTournament()">Erneut versuchen</button></div>';
      }
    }

    function formatType(t) {
      const map = { americano: 'Americano', mixedAmericano: 'Mixed Americano', mexicano: 'Mexicano', kingOfCourt: 'King of Court', groups: 'Gruppen/KO' };
      return map[t] || t;
    }

    function computeStandings() {
      // match.team1 / match.team2 store player NAMES (not IDs)
      // player.points and player.games are already computed by the app engine
      const players = tournament.players || [];
      if (players.length && players[0].points !== undefined) {
        // Use pre-computed stats from the app
        return [...players].sort((a, b) => (b.points || 0) - (a.points || 0) || (b.games || 0) - (a.games || 0));
      }
      // Fallback: compute from rounds
      const rounds = tournament.rounds || [];
      const stats = {};
      players.forEach(p => { stats[p.name] = { name: p.name, points: 0, games: 0 }; });
      rounds.forEach(round => {
        (round.matches || []).forEach(match => {
          if (match.score1 == null || match.score2 == null) return;
          const s1 = match.score1, s2 = match.score2;
          (match.team1 || []).forEach(name => {
            if (!stats[name]) stats[name] = { name, points: 0, games: 0 };
            stats[name].points += s1; stats[name].games++;
          });
          (match.team2 || []).forEach(name => {
            if (!stats[name]) stats[name] = { name, points: 0, games: 0 };
            stats[name].points += s2; stats[name].games++;
          });
        });
      });
      return Object.values(stats).sort((a, b) => (b.points || 0) - (a.points || 0) || (b.games || 0) - (a.games || 0));
    }

    function getPlayerName(nameOrId) {
      // team1/team2 already contain names, so just return as-is
      return nameOrId;
    }

    function renderStandings() {
      const rows = computeStandings();
      const medals = ['🥇', '🥈', '🥉'];
      return `
        <table class="standings-table">
          <thead>
            <tr>
              <th>Spieler</th>
              <th>Sp.</th>
              <th>Pkt.</th>
              <th>Ø</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((r, i) => `
              <tr>
                <td>
                  <div class="rank-cell">
                    <span class="rank-num">${i < 3 ? '' : i + 1}</span>
                    ${i < 3 ? `<span class="medal">${medals[i]}</span>` : ''}
                    <span class="player-name">${r.name}</span>
                  </div>
                </td>
                <td>${r.games || 0}</td>
                <td class="pts-cell">${r.points || 0}</td>
                <td style="color:#888">${(r.games || 0) > 0 ? ((r.points || 0) / (r.games || 1)).toFixed(1) : '–'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderRounds() {
      const rounds = tournament.rounds || [];
      if (!rounds.length) return '<div style="color:#555;text-align:center;padding:40px">Noch keine Runden gespielt.</div>';
      const round = rounds[activeRound];
      const matches = round?.matches || [];
      const byePlayers = round?.byePlayers || [];

      return `
        <div class="round-tabs">
          ${rounds.map((r, i) => `
            <button class="round-btn ${i === activeRound ? 'active' : ''}" onclick="selectRound(${i})">${i + 1}</button>
          `).join('')}
        </div>
        ${matches.map((m, idx) => {
          const done = m.score1 != null && m.score2 != null;
          const s1 = done ? m.score1 : '–';
          const s2 = done ? m.score2 : '–';
          const w1 = done && m.score1 > m.score2;
          const w2 = done && m.score2 > m.score1;
          const t1 = (m.team1 || []).map(getPlayerName).join('\n');
          const t2 = (m.team2 || []).map(getPlayerName).join('\n');
          return `
            <div class="match-card ${done ? 'done' : ''}">
              <div class="match-court">🏟 Court ${m.court != null ? m.court + 1 : idx + 1}</div>
              <div class="match-row">
                <div class="team-names">${t1.replace(/\n/g, '<br>')}</div>
                <div class="score-box">
                  <div class="score-num ${w1 ? 'winner' : ''}">${s1}</div>
                  <span class="score-divider">:</span>
                  <div class="score-num ${w2 ? 'winner' : ''}">${s2}</div>
                </div>
                <div class="team-names right">${t2.replace(/\n/g, '<br>')}</div>
              </div>
            </div>
          `;
        }).join('')}
        ${byePlayers.length ? `
          <div class="bye-section">
            <div class="bye-label">⏸ Pausierende Spieler</div>
            <div class="bye-players">
              ${byePlayers.map(id => `<span class="bye-chip">${getPlayerName(id)}</span>`).join('')}
            </div>
          </div>
        ` : ''}
      `;
    }

      const players = (t.players || []).length;
      const maxPts = t.settings?.pointsPerGame || 24;

          <div class="header-text">
            <h1>${t.name || 'Turnier'}</h1>
            <p>${formatType(t.type)} · ${date}</p>
          </div>
          <span class="badge ${isLive ? '' : 'done'}">${isLive ? '🟢 Live' : 'Beendet'}</span>
        </div>
        <div class="container">
          <div class="readonly-banner">👁 Nur-Ansicht · Aktualisiert sich automatisch alle 30 Sek.</div>
          <div class="meta-card">
            <div class="meta-row">
              <span class="meta-label">Spielmodus</span>
              <span class="meta-value">${formatType(t.type)}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Spieler</span>
              <span class="meta-value">${players}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Punkte pro Spiel</span>
              <span class="meta-value">${maxPts}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Runde</span>
              <span class="meta-value">${t.currentRound || 1} / ${(t.rounds || []).length}</span>
            </div>
          </div>
          <div class="tabs">
            <button class="tab ${activeTab === 'standings' ? 'active' : ''}" onclick="switchTab('standings')">🏆 Tabelle</button>
            <button class="tab ${activeTab === 'rounds' ? 'active' : ''}" onclick="switchTab('rounds')">📋 Spielplan</button>
          </div>
          <div id="tab-content">
            ${activeTab === 'standings' ? renderStandings() : renderRounds()}
          </div>
          <button class="refresh-btn" onclick="fetchTournament()">🔄 Aktualisieren</button>
          <div style="text-align:center;margin-top:20px;padding-bottom:30px;font-size:11px;color:#333">PDL1 · Nur-Ansicht</div>
        </div>
      `;
    }

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-content').innerHTML = tab === 'standings' ? renderStandings() : renderRounds();
      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('active', (i === 0 && tab === 'standings') || (i === 1 && tab === 'rounds'));
      });
    }

    function selectRound(idx) {
      activeRound = idx;
      document.getElementById('tab-content').innerHTML = renderRounds();
    }

    // Auto-refresh every 30 seconds
    setInterval(fetchTournament, 30000);
    fetchTournament();
  </script>
</body>
